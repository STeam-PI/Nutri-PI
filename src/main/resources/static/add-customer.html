<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Agendamento – NutriVibes</title>
  <link rel="stylesheet" href="styles.css">
  <style>.new-appt-card{max-width:680px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-xl);padding:2rem}.new-appt-card h2{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;padding-bottom:.875rem;border-bottom:1px solid var(--gray-100)}.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem}.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}.form-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}</style>
</head>
<body>
<div class="admin-layout">
  
<nav class="sidebar" aria-label="Menu administrativo">
  <div class="sidebar__logo">
    <span class="sidebar__logo-icon">N</span>
    <span class="sidebar__logo-name">NutriAdmin</span>
  </div>
  <div class="sidebar__nav">
    <a href="schedule-dashboard.html" class="sidebar__link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Dashboard</a>
    <a href="schedule-dashboard.html" class="sidebar__link sidebar__link--active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Agendamentos</a>
    <a href="schedule-opened.html" class="sidebar__link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Disponibilidade</a>
    <a href="customer-empty-state.html" class="sidebar__link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Pacientes</a>
  </div>
  <div class="sidebar__footer">
    <a href="login.html" class="sidebar__link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sair</a>
  </div>
</nav>
  <div class="admin-main">
    
<header class="admin-topbar">
  <h1 class="admin-topbar__title">Novo Agendamento</h1>
  <div class="admin-topbar__right">
    <button class="admin-topbar__bell" aria-label="Notificações"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
    <div class="admin-topbar__user">
      <div class="admin-topbar__user-info">
        <p class="admin-topbar__user-name">Leticia Rocha</p>
        <p class="admin-topbar__user-role">Nutricionista Chefe</p>
      </div>
      <div class="admin-topbar__avatar">
        <img src="image-admin-profile0.png" alt="Leticia Rocha" onerror="this.style.display='none'">
        <span id="avatarFallback">LR</span>
      </div>
    </div>
  </div>
</header>
    <main class="admin-content">
      <div class="new-appt-card">
        <h2>Dados do Agendamento</h2>
        <form class="auth-form" action="schedule-dashboard.html" method="get" novalidate>
          <div class="form-group">
            <label class="form-label" for="a-nome"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Nome Completo</label>
            <input class="form-input no-icon" type="text" id="a-nome" name="nome"
              placeholder="Nome do paciente" required>
          </div>
          <div class="form-2col">
            <div class="form-group">
              <label class="form-label" for="a-email"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg> E-mail</label>
              <input class="form-input no-icon" type="email" id="a-email" name="email"
                placeholder="email@exemplo.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="a-tel"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 10.23 19.79 19.79 0 0 1 1.61 1.67 2 2 0 0 1 3.58 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.1 6.1l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 15.92z"/></svg> Telefone / WhatsApp</label>
              <input class="form-input no-icon" type="tel" id="a-tel" name="tel"
                placeholder="(11) 99999-9999">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="a-objetivo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Objetivo Principal</label>
            <select class="form-input no-icon" id="a-objetivo" name="objetivo">
              <option value="">Selecione...</option>
              <option>Emagrecimento</option>
              <option>Hipertrofia</option>
              <option>Reeducação Alimentar</option>
              <option>Nutrição Esportiva</option>
              <option>Saúde Geral</option>
              <option>Nutrição Vegetariana/Vegana</option>
            </select>
          </div>
          <div class="form-2col">
            <div class="form-group">
              <label class="form-label" for="a-data"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Data</label>
              <input class="form-input no-icon" type="date" id="a-data" name="data" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="a-hora"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Horário</label>
              <select class="form-input no-icon" id="a-hora" name="hora">
                <option value="">Selecione...</option>
                <option>09:00</option><option>10:00</option><option>11:00</option>
                <option>14:00</option><option>15:00</option><option>16:00</option>
                <option>17:00</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="a-status">Status</label>
            <select class="form-input no-icon" id="a-status" name="status">
              <option value="confirmado">Confirmado</option>
              <option value="pendente">Pendente</option>
              <option value="concluido">Concluído</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <div class="form-actions">
            <a href="schedule-dashboard.html" class="btn btn--outline">Cancelar</a>
            <button type="submit" class="btn btn--primary btn--round">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Salvar Agendamento
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>
</body></html>
